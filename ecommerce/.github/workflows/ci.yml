name: CI

# Build + test every push to main/develop and every PR.
# Matrix splits services so jobs finish ~5 min instead of 20.
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:    # allow manual triggering

# Cancel in-flight runs when a new commit is pushed to the same branch/PR —
# saves CI minutes when devs push fast successive commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: '-Xmx2g -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn'

jobs:
  # ── Step 1: install common-lib (everyone depends on it) ─────────────────────
  common-lib:
    name: Build common-lib (shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install common-lib to local repo
        run: cd common-lib && mvn -B -q install -DskipTests

      # Cache the installed common-lib so per-service jobs can pull it without rebuilding.
      - name: Cache local Maven repo (~/.m2)
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository
          key: m2-commonlib-${{ github.sha }}

  # ── Step 2: build + test each service in parallel ───────────────────────────
  build-and-test:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: common-lib
    strategy:
      fail-fast: false    # one failing service shouldn't cancel the others
      matrix:
        service:
          - auth-service
          - catalog-service
          - order-service
          - cart-service
          - payment-service
          - inventory-service
          - voucher-service
          - notification-service
          - search-service
          - shipping-service
          - user-profile-service
          - flash-sale-service
          - analytics-service
          - api-gateway
          - eureka-server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # Restore the common-lib artifact built upstream.
      - name: Restore Maven cache with common-lib
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: m2-commonlib-${{ github.sha }}

      - name: Compile ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B -q compile

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: mvn -B test -Djacoco.skip=true -DfailIfNoTests=false

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          retention-days: 7

  # ── Step 3: security + dependency scan ─────────────────────────────────────
  security-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: common-lib
    steps:
      - uses: actions/checkout@v4
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          # Don't fail the build on CVEs (yet) — report only, fix iteratively.
          exit-code: '0'
          format: 'table'

  # ── Step 4: summary — fail if any matrix job failed ────────────────────────
  ci-status:
    name: CI status
    runs-on: ubuntu-latest
    needs: [common-lib, build-and-test, security-scan]
    if: always()
    steps:
      - name: Check all upstream jobs
        run: |
          if [ "${{ needs.common-lib.result }}" != "success" ] \
             || [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
