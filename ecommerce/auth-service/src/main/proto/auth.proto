syntax = "proto3";

package hieu.auth.v1;

option java_multiple_files = true;
option java_package = "com.hieu.auth_service.interfaces.grpc.proto";
option java_outer_classname = "AuthProto";

// =====================================================================
// AuthService: inter-service identity + authorization RPCs.
//
// Designed for low-latency calls from sibling microservices that would
// otherwise issue HTTP round-trips to auth-service. Version prefix in the
// Protobuf package (v1) guards against breaking changes.
// =====================================================================
service AuthService {
  // Parses and validates the access JWT, returning the decoded claims.
  // Invalid / expired / revoked tokens return valid=false.
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);

  // Returns true when the user has the given role.
  rpc CheckRole(CheckRoleRequest) returns (CheckRoleResponse);

  // Returns true when any of the user's roles grants the permission.
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);

  // Read-only profile lookup by user id.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

// ------ VerifyToken ------

message VerifyTokenRequest {
  string access_token = 1;
}

message VerifyTokenResponse {
  bool   valid          = 1;
  string user_id        = 2; // Empty when valid = false
  string username       = 3;
  int32  token_version  = 4;
  repeated string roles = 5;
}

// ------ CheckRole / CheckPermission ------

message CheckRoleRequest {
  string user_id   = 1;
  string role_name = 2;
}

message CheckRoleResponse {
  bool has_role = 1;
}

message CheckPermissionRequest {
  string user_id         = 1;
  string permission_name = 2;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

// ------ GetUser ------

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  bool   found      = 1;
  string user_id    = 2;
  string username   = 3;
  string email      = 4;
  bool   active     = 5;
  repeated string roles       = 6;
  repeated string permissions = 7;
}
