# Lightweight dev profile — in-memory H2 with Hibernate schema generation.
# Activate with: -Dspring.profiles.active=h2  (or SPRING_PROFILES_ACTIVE=h2).
# Production always runs the default profile which uses Flyway + Postgres.

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false
