spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: cart-service
  grpc:
    server:
      port: ${GRPC_PORT:9094}
  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5435/cartdb}
    username: ${DB_USER:cartuser}
    password: ${DB_PASSWORD:cartpass}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:50}
      minimum-idle: ${DB_POOL_MIN:10}
      connection-timeout: 3000
      max-lifetime: 1800000
      idle-timeout: 600000
      leak-detection-threshold: 60000
  jpa:
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${JPA_DDL:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: cart-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.HashMap
        spring.json.trusted.packages: com.hieu.*
    listener:
      missing-topics-fatal: false
      concurrency: ${KAFKA_CONCURRENCY:3}
  threads:
    virtual:
      enabled: true
server:
  port: ${SERVER_PORT:8084}
jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-please-32chars}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin123@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
spring.grpc:
  client:
    catalog-service:
      address: ${CATALOG_GRPC_ADDRESS:static://127.0.0.1:9093}
      negotiation-type: plaintext
services:
  catalog-url: ${CATALOG_SERVICE_URL:http://localhost:8083}
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
spring.cloud.openfeign.client.config:
  default:
    connectTimeout: ${FEIGN_CONNECT_TIMEOUT:2000}
    readTimeout: ${FEIGN_READ_TIMEOUT:3000}
    loggerLevel: ${FEIGN_LOG_LEVEL:BASIC}
logging:
  level:
    com.hieu.cart_service: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{30} - %msg%n'

# ── Feign + Resilience4j circuit breaker ──
spring.cloud.openfeign.circuitbreaker:
  enabled: true
  group:
    enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 70
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      CatalogClient:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
        cancelRunningFuture: true
