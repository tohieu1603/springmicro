# =====================================================================
# Infrastructure-only stack for local dev.
#
#   docker compose up -d            # bring up postgres + redis + kafka
#   docker compose down             # stop + remove containers
#   docker compose down -v          # + wipe data volumes
#
# Services (eureka-server / auth-service / api-gateway) run on the host
# via `mvn spring-boot:run` and connect to these containers via localhost.
# =====================================================================

services:
  # One Postgres instance per service — isolation + easy per-service backup/restore.
  # Host ports: auth=5433, catalog=5434 (increment by 1 for each new service).
  postgres-auth:
    image: postgres:16-alpine
    container_name: hieu-postgres-auth
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-authdb}
      POSTGRES_USER: ${POSTGRES_AUTH_USER:-authuser}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD:-authpass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER:-authuser} -d ${POSTGRES_AUTH_DB:-authdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-catalog:
    image: postgres:16-alpine
    container_name: hieu-postgres-catalog
    environment:
      POSTGRES_DB: ${POSTGRES_CATALOG_DB:-catalogdb}
      POSTGRES_USER: ${POSTGRES_CATALOG_USER:-cataloguser}
      POSTGRES_PASSWORD: ${POSTGRES_CATALOG_PASSWORD:-catalogpass}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-catalog:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CATALOG_USER:-cataloguser} -d ${POSTGRES_CATALOG_DB:-catalogdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-cart:
    image: postgres:16-alpine
    container_name: hieu-postgres-cart
    environment:
      POSTGRES_DB: ${POSTGRES_CART_DB:-cartdb}
      POSTGRES_USER: ${POSTGRES_CART_USER:-cartuser}
      POSTGRES_PASSWORD: ${POSTGRES_CART_PASSWORD:-cartpass}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-cart:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CART_USER:-cartuser} -d ${POSTGRES_CART_DB:-cartdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-order:
    image: postgres:16-alpine
    container_name: hieu-postgres-order
    environment:
      POSTGRES_DB: ${POSTGRES_ORDER_DB:-orderdb}
      POSTGRES_USER: ${POSTGRES_ORDER_USER:-orderuser}
      POSTGRES_PASSWORD: ${POSTGRES_ORDER_PASSWORD:-orderpass}
    ports:
      - "5436:5432"
    volumes:
      - pgdata-order:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ORDER_USER:-orderuser} -d ${POSTGRES_ORDER_DB:-orderdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-payment:
    image: postgres:16-alpine
    container_name: hieu-postgres-payment
    environment:
      POSTGRES_DB: ${POSTGRES_PAYMENT_DB:-paymentdb}
      POSTGRES_USER: ${POSTGRES_PAYMENT_USER:-paymentuser}
      POSTGRES_PASSWORD: ${POSTGRES_PAYMENT_PASSWORD:-paymentpass}
    ports:
      - "5437:5432"
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_PAYMENT_USER:-paymentuser} -d ${POSTGRES_PAYMENT_DB:-paymentdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-shipping:
    image: postgres:16-alpine
    container_name: hieu-postgres-shipping
    environment:
      POSTGRES_DB: ${POSTGRES_SHIPPING_DB:-shippingdb}
      POSTGRES_USER: ${POSTGRES_SHIPPING_USER:-shippinguser}
      POSTGRES_PASSWORD: ${POSTGRES_SHIPPING_PASSWORD:-shippingpass}
    ports:
      - "5438:5432"
    volumes:
      - pgdata-shipping:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SHIPPING_USER:-shippinguser} -d ${POSTGRES_SHIPPING_DB:-shippingdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-inventory:
    image: postgres:16-alpine
    container_name: hieu-postgres-inventory
    environment:
      POSTGRES_DB: ${POSTGRES_INVENTORY_DB:-inventorydb}
      POSTGRES_USER: ${POSTGRES_INVENTORY_USER:-inventoryuser}
      POSTGRES_PASSWORD: ${POSTGRES_INVENTORY_PASSWORD:-inventorypass}
    ports:
      - "5439:5432"
    volumes:
      - pgdata-inventory:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_INVENTORY_USER:-inventoryuser} -d ${POSTGRES_INVENTORY_DB:-inventorydb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-flashsale:
    image: postgres:16-alpine
    container_name: hieu-postgres-flashsale
    environment:
      POSTGRES_DB: ${POSTGRES_FLASHSALE_DB:-flashsaledb}
      POSTGRES_USER: ${POSTGRES_FLASHSALE_USER:-flashsaleuser}
      POSTGRES_PASSWORD: ${POSTGRES_FLASHSALE_PASSWORD:-flashsalepass}
    ports:
      - "5440:5432"
    volumes:
      - pgdata-flashsale:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_FLASHSALE_USER:-flashsaleuser} -d ${POSTGRES_FLASHSALE_DB:-flashsaledb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-notification:
    image: postgres:16-alpine
    container_name: hieu-postgres-notification
    environment:
      POSTGRES_DB: ${POSTGRES_NOTIFICATION_DB:-notificationdb}
      POSTGRES_USER: ${POSTGRES_NOTIFICATION_USER:-notificationuser}
      POSTGRES_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD:-notificationpass}
    ports:
      - "5441:5432"
    volumes:
      - pgdata-notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_NOTIFICATION_USER:-notificationuser} -d ${POSTGRES_NOTIFICATION_DB:-notificationdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-userprofile:
    image: postgres:16-alpine
    container_name: hieu-postgres-userprofile
    environment:
      POSTGRES_DB: ${POSTGRES_USERPROFILE_DB:-userprofiledb}
      POSTGRES_USER: ${POSTGRES_USERPROFILE_USER:-userprofileuser}
      POSTGRES_PASSWORD: ${POSTGRES_USERPROFILE_PASSWORD:-userprofilepass}
    ports:
      - "5442:5432"
    volumes:
      - pgdata-userprofile:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERPROFILE_USER:-userprofileuser} -d ${POSTGRES_USERPROFILE_DB:-userprofiledb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-voucher:
    image: postgres:16-alpine
    container_name: hieu-postgres-voucher
    environment:
      POSTGRES_DB: ${POSTGRES_VOUCHER_DB:-voucherdb}
      POSTGRES_USER: ${POSTGRES_VOUCHER_USER:-voucheruser}
      POSTGRES_PASSWORD: ${POSTGRES_VOUCHER_PASSWORD:-voucherpass}
    ports:
      - "5443:5432"
    volumes:
      - pgdata-voucher:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_VOUCHER_USER:-voucheruser} -d ${POSTGRES_VOUCHER_DB:-voucherdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hieu-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  redis:
    image: redis:7-alpine
    container_name: hieu-redis
    ports: ["6379:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MongoDB for notification-service (WebFlux + Reactive Mongo).
  # Single-node, no auth — dev only; production deploys with replicaSet + auth.
  mongo:
    image: mongo:7
    container_name: hieu-mongo
    ports: ["27017:27017"]
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Zipkin — distributed tracing UI + collector. Services push spans via
  # Micrometer Tracing + Brave bridge to http://zipkin:9411/api/v2/spans.
  # In-memory storage (dev only); production uses Elasticsearch or Cassandra.
  zipkin:
    image: openzipkin/zipkin:3
    container_name: hieu-zipkin
    ports: ["9411:9411"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Apache Kafka 3.8 in KRaft mode — no Zookeeper required.
  # Official apache/kafka image runs controller + broker in a single process.
  kafka:
    image: apache/kafka:3.8.0
    container_name: hieu-kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVCNTcwNTJENDM2Qk
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-broker dev defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: hieu-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Kibana — dashboards for analytics-events-* and logs-* indices.
  kibana:
    image: docker.elastic.co/kibana/kibana:9.0.0
    container_name: hieu-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15

  # Prometheus — scrapes /actuator/prometheus from every Spring Boot service.
  # Scrape targets live in ./prometheus/prometheus.yml; alert rules in ./prometheus/alerts/.
  # Services run on the host (host.docker.internal) until full-container deploy.
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: hieu-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - promdata:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Grafana — dashboards for Spring Boot (HTTP/JVM), HikariCP, Kafka, gateway latency.
  # Default login admin/admin (change in prod via env). Datasources + dashboards are
  # auto-provisioned from ./grafana/provisioning/ on startup.
  grafana:
    image: grafana/grafana:11.3.0
    container_name: hieu-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # AlertManager — receives alerts from Prometheus, deduplicates + routes to
  # Slack/email/PagerDuty. Config in ./prometheus/alertmanager.yml.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hieu-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      # Host 9093 is reserved for catalog-service's gRPC server (host-run) and the 909x band
      # is used by other services' gRPC ports. Expose Alertmanager's UI on 19093 instead;
      # container port unchanged.
      - "19093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanagerdata:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Filebeat — scrape Docker container stdout/stderr → ES index logs-YYYY.MM.dd.
  filebeat:
    image: docker.elastic.co/beats/filebeat:9.0.0
    container_name: hieu-filebeat
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/services:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeatdata:/usr/share/filebeat/data
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  pgdata-auth:
  pgdata-catalog:
  pgdata-cart:
  pgdata-order:
  pgdata-payment:
  pgdata-shipping:
  pgdata-inventory:
  pgdata-flashsale:
  pgdata-notification:
  pgdata-userprofile:
  pgdata-voucher:
  redisdata:
  mongodata:
  kafkadata:
  esdata:
  filebeatdata:
  promdata:
  grafanadata:
  alertmanagerdata:
