server:
  port: 8761
spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: eureka-server
  threads:
    virtual:
      enabled: true
eureka:
  username: ${EUREKA_USERNAME:admin}
  password: ${EUREKA_PASSWORD:admin123}
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: false
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.username}:${eureka.password}@${eureka.instance.hostname}:${server.port}/eureka/
  server:
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:true}
    eviction-interval-timer-in-ms: 60000
    response-cache-update-interval-ms: 30000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{30} - %msg%n'
