# Auto-load every JSON dashboard from /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: ecommerce
    orgId: 1
    folder: Ecommerce
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
