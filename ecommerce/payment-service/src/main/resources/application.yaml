spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: payment-service
  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5437/paymentdb}
    username: ${DB_USER:paymentuser}
    password: ${DB_PASSWORD:paymentpass}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:50}
      minimum-idle: ${DB_POOL_MIN:10}
      connection-timeout: 3000
      max-lifetime: 1800000
      idle-timeout: 600000
      leak-detection-threshold: 60000
  jpa:
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${JPA_DDL:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    listener:
      missing-topics-fatal: false
      concurrency: ${KAFKA_CONCURRENCY:3}
  threads:
    virtual:
      enabled: true
server:
  port: ${SERVER_PORT:8086}
jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-please-32chars}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin123@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
sepay:
  qr-base-url: https://qr.sepay.vn/img
  bank-code: BIDV
  bank-account: 96247CISI1
  account-name: TO TRONG HIEU
  webhook:
    api-key: ${SEPAY_WEBHOOK_API_KEY:}
    allow-insecure: ${SEPAY_WEBHOOK_ALLOW_INSECURE:false}
momo:
  partner-code: MOMO_DEMO
  sandbox-base-url: https://test-payment.momo.vn/v2/gateway/pay
  return-url: http://localhost:3000/payment/momo/return
payment:
  momo:
    secret-key: ${MOMO_SECRET_KEY:}
  methods:
  - code: COD
    name: "Thanh to\xE1n khi nh\u1EADn h\xE0ng (COD)"
    description: "Tr\u1EA3 ti\u1EC1n m\u1EB7t khi nh\u1EADn h\xE0ng"
    icon: payments
    enabled: true
  - code: SEPAY
    name: "Chuy\u1EC3n kho\u1EA3n ng\xE2n h\xE0ng (SePay)"
    description: "Qu\xE9t QR/VietQR \u2014 t\u1EF1 x\xE1c nh\u1EADn khi ti\u1EC1n\
      \ v\u1EC1"
    icon: qr_code_2
    enabled: true
  - code: MOMO
    name: "V\xED MoMo"
    description: "Thanh to\xE1n qua v\xED MoMo"
    icon: account_balance_wallet
    enabled: true
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
logging:
  level:
    com.hieu.payment_service: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{30} - %msg%n'
