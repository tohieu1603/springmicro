# SonarQube scanner config cho HIEU Backend (15 microservices Spring Boot).
#
# Vì không có parent POM, ta scan như một dự án đa-module logic — mỗi service
# được khai báo thành một module Sonar riêng để dashboard có thể drill-down.
#
# Chạy:
#   docker run --rm -e SONAR_HOST_URL=http://host.docker.internal:9000 \
#       -e SONAR_TOKEN=$SONAR_TOKEN \
#       -v "$PWD:/usr/src" sonarsource/sonar-scanner-cli:latest

sonar.projectKey=hieu-backend
sonar.projectName=HIEU Backend
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ── Module list ─────────────────────────────────────────────────
sonar.modules=\
    auth,\
    catalog,\
    cart,\
    order,\
    payment,\
    shipping,\
    inventory,\
    voucher,\
    flashsale,\
    notification,\
    userprofile,\
    search,\
    analytics,\
    gateway,\
    eureka,\
    common

# Common settings áp dụng cho mọi module Java:
#   sonar.sources, sonar.java.binaries, sonar.java.libraries
sonar.java.source=25
sonar.exclusions=\
    **/target/**,\
    **/generated-sources/**,\
    **/build/**,\
    **/*.proto,\
    **/protobuf/**

# Bỏ qua test fixtures khi check duplicate.
sonar.cpd.exclusions=**/dto/**,**/proto/**

# ── Module-specific paths ──────────────────────────────────────
auth.sonar.projectBaseDir=auth-service
auth.sonar.projectName=auth-service
auth.sonar.sources=src/main/java
auth.sonar.tests=src/test/java
auth.sonar.java.binaries=target/classes

