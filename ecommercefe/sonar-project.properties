# SonarQube scanner config cho HIEU Frontend (Next.js 15 + TypeScript)
# Chạy:
#   docker run --rm -e SONAR_HOST_URL=http://host.docker.internal:9000 \
#       -e SONAR_TOKEN=$SONAR_TOKEN \
#       -v "$PWD:/usr/src" sonarsource/sonar-scanner-cli:latest

sonar.projectKey=hieu-frontend
sonar.projectName=HIEU Frontend
sonar.projectVersion=1.0

# Mã nguồn cần phân tích.
sonar.sources=app,components,lib,middleware.ts,next.config.ts
sonar.tests=

# Encoding.
sonar.sourceEncoding=UTF-8

# Loại trừ các thư mục build / node_modules / generated.
sonar.exclusions=\
    **/node_modules/**,\
    **/.next/**,\
    **/.turbo/**,\
    **/dist/**,\
    **/build/**,\
    **/coverage/**,\
    **/*.d.ts,\
    public/**,\
    fe/**

# Coverage (nếu chạy Vitest/Jest có sinh lcov.info thì uncomment).
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Bỏ qua duplicate trong test fixtures.
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**

# Báo lỗi với những file > 5MB (auto-generated / lock).
sonar.javascript.maxFileSize=5
